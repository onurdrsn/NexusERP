name = "nexus-erp-api"
main = "src/index.ts"
compatibility_date = "2026-04-07"
compatibility_flags = ["nodejs_compat"]

[vars]
NODE_ENV = "production"

[[kv_namespaces]]
binding = "CACHE"
id = "e401665f4ce14cb7bd2894918fcc4bd7"

[[routes]]
pattern = "api.nexuserp.onurd.com.tr/*"
zone_name = "onurd.com.tr"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
